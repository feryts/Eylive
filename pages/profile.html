<script>

const user=JSON.parse(localStorage.getItem("eylive_user"));

if(user){

document.getElementById("username").innerHTML=user.username||"Misafir";

document.getElementById("coin").innerHTML=user.coin;

document.getElementById("diamond").innerHTML=user.diamond;

document.getElementById("avatar").src=user.avatar;

}

document.getElementById("logoutBtn").onclick=()=>{

localStorage.removeItem("eylive_user");

location.href="../index.html";

};
